[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Image entrypoint /opt/hermes/docker/entrypoint.sh wraps args with `hermes`,
# activates its uv venv, drops to user `hermes`, and seeds $HERMES_HOME from
# bundled examples on first boot. So this CMD becomes `hermes gateway run`.
startCommand = "gateway run"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# No healthcheckPath — Hermes does not expose an HTTP health endpoint by default.
# (Could enable hermes dashboard later for one, but it exposes API keys.)

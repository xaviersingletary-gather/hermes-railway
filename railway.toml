[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway's startCommand bypasses the image ENTRYPOINT, so we must invoke the
# venv-activating bootstrap script ourselves. exec replaces the sh process so
# hermes (the gateway) is PID 1's child directly, not under an extra shell.
startCommand = "/opt/hermes/docker/entrypoint.sh gateway run"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# No healthcheckPath — Hermes does not expose an HTTP health endpoint by default.
# (Could enable hermes dashboard later for one, but it exposes API keys.)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway wraps startCommand in `sh -c "..."`. The image entrypoint's dual-mode
# logic sees `sh` as a PATH binary and exec's it, so we must spell out `hermes`
# rather than relying on the entrypoint's `exec hermes "$@"` wrap-with-hermes
# fallback (that only fires when args[0] is NOT on PATH).
startCommand = "hermes gateway run"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# No healthcheckPath — Hermes does not expose an HTTP health endpoint by default.
# (Could enable hermes dashboard later for one, but it exposes API keys.)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# PHASE 0 DIAGNOSTIC: wrap the start to capture stderr and keep the container
# alive long enough for Railway to scrape logs. Revert once we know the cause.
startCommand = "sh -c 'set +e; echo === UPSTREAM DOCKERFILE ===; cat /opt/hermes/Dockerfile 2>&1 | head -80; echo === DOCKER DIR ===; ls /opt/hermes/docker 2>&1; echo === HERMES BINARY ===; file /opt/hermes/hermes 2>&1; head -3 /opt/hermes/hermes 2>&1; echo === HERMES VERSION ===; /opt/hermes/hermes --version 2>&1; echo VER_EXIT=$?; echo === GATEWAY RUN STDERR ===; /opt/hermes/hermes gateway run 2>&1; echo EXIT=$?; echo === HOLDING 300s ===; sleep 300'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 1
# No healthcheckPath — Hermes does not expose an HTTP health endpoint.

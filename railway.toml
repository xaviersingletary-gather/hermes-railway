[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# DIAGNOSTIC: prove the entrypoint chain still works, capture args & exit.
startCommand = "sh -c 'echo HELLO_FROM_WRAPPER; echo ARGS_SEEN: $0 $@; /opt/hermes/docker/entrypoint.sh gateway run; echo ENTRYPOINT_EXIT=$?; sleep 120'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# No healthcheckPath — Hermes does not expose an HTTP health endpoint by default.
# (Could enable hermes dashboard later for one, but it exposes API keys.)
